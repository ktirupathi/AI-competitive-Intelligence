version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scout_secret}
      POSTGRES_DB: ${POSTGRES_DB:-scout_ai}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./database/migrations/002_schema_enhancements.sql:/docker-entrypoint-initdb.d/002_schema_enhancements.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scout}:${POSTGRES_PASSWORD:-scout_secret}@db:5432/${POSTGRES_DB:-scout_ai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./agents:/app/agents
      - ./database:/app/database

  celery-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: celery -A apps.api.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scout}:${POSTGRES_PASSWORD:-scout_secret}@db:5432/${POSTGRES_DB:-scout_ai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./agents:/app/agents
      - ./database:/app/database

  celery-beat:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: celery -A apps.api.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scout}:${POSTGRES_PASSWORD:-scout_secret}@db:5432/${POSTGRES_DB:-scout_ai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
